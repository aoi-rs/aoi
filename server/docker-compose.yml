services:
  postgres:
    image: postgres:18.3-trixie
    environment:
      - POSTGRES_USER=${AOI_POSTGRES_USER}
      - POSTGRES_PASSWORD=${AOI_POSTGRES_PWD}
      - POSTGRES_DB=${AOI_POSTGRES_DATABASE}
      - POSTGRES_PORT=${AOI_POSTGRES_PORT:-5432}
    volumes:
      - database:/var/lib/postgresql
    ports:
      - ${AOI_POSTGRES_PORT:-5432}:5432
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-q",
          "-d",
          "${AOI_POSTGRES_DATABASE}",
          "-U",
          "${AOI_POSTGRES_USER}",
        ]
      timeout: 40s
      interval: 2s
      retries: 20

  dynamodb:
    image: amazon/dynamodb-local:3.3.0
    ports:
      - "${AOI_DYNAMODB_PORT:-8080}:8000"

volumes:
  database: