name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - server/**
      - crates/redirector/**
      - apps/www/**
      - .github/workflows/build-and-release.yml

  workflow_dispatch:

jobs:
  diff:
    name: Detect Modified Paths
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      redirector: ${{ steps.filter.outputs.redirector }}
      studio: ${{ steps.filter.outputs.studio }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter Modified Files
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/build-and-release.yml'
            redirector:
              - 'crates/redirector/**'
              - '.github/workflows/build-and-release.yml'
            studio:
              - 'apps/www/**'
              - '.github/workflows/build-and-release.yml'
            migrations:
              - 'server/migrations/**'

  build:
    name: Build & Push Service
    needs: diff
    if: needs.diff.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
    outputs:
      image: |
        ${{ steps.login.outputs.registry }}/aoi@${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891924440815:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login.outputs.registry }}
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/aoi
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        id: push
        uses: useblacksmith/build-push-action@v2
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: server

  build-redirector:
    name: Build & Push Redirector
    needs: diff
    if: needs.diff.outputs.redirector == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
    outputs:
      image: |
        ${{ steps.login.outputs.registry }}/aoi-redirector@${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891924440815:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login.outputs.registry }}
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/aoi-redirector
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        id: push
        uses: useblacksmith/build-push-action@v2
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: crates/redirector

  build-studio:
    name: Build Studio
    needs: diff
    if: needs.diff.outputs.studio == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      deployment: ${{ steps.deploy.outputs.deployment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Create Deployment
        id: deploy
        run: |
          DEPLOYMENT=$(vercel deploy --prod --skip-domain --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment=$DEPLOYMENT" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOYMENT"

  release:
    name: Release
    needs: [diff, build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.diff.outputs.server == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891924440815:role/github-actions
          aws-region: us-east-1
        
      - name: Render ECS Task Definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:us-east-1:891924440815:task-definition/aoi
          container-name: aoi
          image: ${{ needs.build.outputs.image }}
        
      - name: Run Database Migrations
        if: needs.diff.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: aoi
          run-task: true
          run-task-launch-type: FARGATE
          wait-for-task-stopped: true
          run-task-subnets: ${{ vars.ECS_PUBLIC_SUBNETS }}
          run-task-security-groups: ${{ vars.ECS_SECURITY_GROUP }}
          run-task-assign-public-IP: ENABLED
          run-task-container-overrides: |
            [
              {
                "name": "aoi",
                "command": ["uv", "run", "task", "db_migrate"]
              }
            ]
        
      - name: Deploy ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: aoi
          service: aoi
          wait-for-service-stability: true
  
  release-redirector:
    name: Release Redirector
    needs: [diff, build-redirector]
    if: always() && (needs.build-redirector.result == 'success' || needs.build-redirector.result == 'skipped') && (needs.diff.outputs.redirector == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891924440815:role/github-actions
          aws-region: us-east-1
      
      - name: Render ECS Task Definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:us-east-1:891924440815:task-definition/aoi-redirector
          container-name: aoi-redirector
          image: ${{ needs.build-redirector.outputs.image }}
        
      - name: Deploy ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: aoi
          service: aoi-redirector
          wait-for-service-stability: true

  release-studio:
    name: Release Studio
    needs: [diff, build-studio, release]
    if: always() && (needs.build-studio.result == 'success' || needs.build-studio.result == 'skipped') && (needs.diff.outputs.studio == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Promote to Production
        run: |
          echo "Releasing studio: ${{ needs.build-studio.outputs.deployment }}"
          vercel promote ${{ needs.build-studio.outputs.deployment }} --token=${{ secrets.VERCEL_TOKEN }}
          echo "Released: ${{ needs.build-studio.outputs.deployment }}"