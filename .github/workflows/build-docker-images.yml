name: Build Docker Images

on:
  push:
    branches: ["main"]
    paths:
      - server/**
      - .github/workflows/build-docker-images.yml

  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter Modified Files
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/build-docker-images.yml'

  build:
    name: Build Docker Images
    needs: changes
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image: |
        ${{ steps.login.outputs.registry }}/rinku@${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891924440815:role/github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login.outputs.registry }}
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/rinku
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        id: push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: server

  release:
    name: Release
    needs: [changes, build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/release.yml
    with:
      rinku-image: ${{ needs.build.outputs.image }}
